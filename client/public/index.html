<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SyncBoard - Offline-first Kanban collaboration tool" />
  <meta name="theme-color" content="#2563eb" />
  
  <title>SyncBoard</title>
  
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="assets/main.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>SyncBoard</h1>
      <div id="sync-status">
        <span id="status-indicator"></span>
        <span id="status-text">Connecting...</span>
      </div>
    </header>
    
    <main id="board-container">
      <!-- Kanban board will be rendered here -->
    </main>
    
    <footer>
      <p>Offline-first • Real-time Sync • Zero Dependencies</p>
    </footer>
  </div>

  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('✅ Service Worker registered'))
        .catch(err => console.error('❌ SW registration failed:', err));
    }
  </script>
  
  <script type="module" src="src/app.js"></script>
</body>
</html>
